name: ChoreSync
version: "0.9.2"
slug: choresync
description: 가족 집안일 관리 앱 (할일, 퀘스트, 위시리스트, IoT 연동, 마켓플레이스, PWA)
url: https://github.com/yunjhl/choresync-ha
arch:
  - aarch64
  - amd64
  - armv7
  - i386
startup: application
boot: auto
ingress: true
ingress_port: 8099
panel_icon: mdi:broom
panel_title: ChoreSync
homeassistant_api: true
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: ChoreSync Web UI
options:
  secret_key: ""
  demo_seed: false
  log_level: info
  mqtt_broker: ""
  mqtt_user: ""
  mqtt_pass: ""
  mqtt_port: 1883
  ha_url: ""
  ha_token: ""
  ha_tts_entity: "tts.google_translate_en_com"
  ha_webhook_id: ""
  scheduler_enabled: true
  llm_url: ""
  llm_model: "exaone3.5:2.4b"
schema:
  secret_key: str
  demo_seed: bool
  log_level: list(debug|info|warning|error)
  mqtt_broker: str
  mqtt_user: str
  mqtt_pass: str
  mqtt_port: int(1,65535)
  ha_url: str
  ha_token: str
  ha_tts_entity: str
  ha_webhook_id: str
  scheduler_enabled: bool
  llm_url: str
  llm_model: str
map:
  - data:rw
